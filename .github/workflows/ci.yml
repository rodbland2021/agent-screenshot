name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff F821 (undefined names)
        run: ruff check --select F821 .

      - name: Syntax check
        run: python -m py_compile screenshot.py && python -m py_compile grab.py && python -m py_compile mcp_server.py
